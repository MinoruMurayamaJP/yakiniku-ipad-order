<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>焼肉店 従業員用注文入力</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --panel: #fffdf9;
      --ink: #211d1a;
      --muted: #716963;
      --line: #d9d0c7;
      --soft: #eee8e0;
      --brand: #a8221d;
      --brand-dark: #741714;
      --green: #0f766e;
      --blue: #245b83;
      --gold: #b47a22;
      --shadow: 0 12px 28px rgba(39, 32, 27, .1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f7f3ee 0%, #ece7df 54%, #eef3f1 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 500px;
      gap: 14px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 249, .92);
      box-shadow: var(--shadow);
    }

    .main {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-width: 0;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(210px, .42fr) minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      padding: 14px 16px;
    }

    .title {
      display: flex;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1.15;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(92px, 1fr));
      gap: 8px;
      padding: 9px;
      overflow-x: auto;
    }

    .tab {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .tab.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .menu-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .menu-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #faf6f0;
    }

    .menu-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .search {
      width: 240px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 12px;
    }

    .menu-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
      padding: 10px;
      overflow-y: auto;
    }

    .product-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px 42px 42px 74px;
      gap: 7px;
      align-items: center;
      min-height: 64px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .product-name {
      min-width: 0;
    }

    .product-name strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 17px;
    }

    .product-name span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .step,
    .qty,
    .add {
      height: 42px;
      border-radius: 8px;
      font-weight: 900;
    }

    .step {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      font-size: 21px;
    }

    .qty {
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 17px;
    }

    .add {
      border: 0;
      background: var(--green);
      color: #fff;
      font-size: 15px;
    }

    .order {
      position: sticky;
      top: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      max-height: calc(100vh - 32px);
      overflow: hidden;
    }

    .order-head {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: #2b2622;
      color: #fff;
    }

    .header .order-head {
      padding: 12px;
      box-shadow: none;
    }

    .terminal-name {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .terminal-name h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .terminal-name span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: rgba(255,255,255,.8);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-line {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.1);
      color: #fff;
      padding: 0 10px;
      font-weight: 900;
    }

    .field select option {
      color: var(--ink);
    }

    .time-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .time-card {
      min-height: 54px;
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.1);
    }

    .time-card span {
      display: block;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      font-weight: 800;
    }

    .time-card strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #faf6f0;
    }

    .status-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #fffdf9;
    }

    .status-strip .field {
      gap: 4px;
    }

    .status-strip label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .order-head .status-strip {
      padding: 0;
      border-bottom: 0;
      background: transparent;
    }

    .order-head .status-strip label {
      color: rgba(255,255,255,.72);
    }

    .order-head .status-strip select {
      border-color: rgba(255,255,255,.22);
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .order-head .status-strip select option {
      color: var(--ink);
    }

    .status-strip select {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 9px;
      color: var(--ink);
      font-weight: 900;
    }

    .summary-box {
      min-height: 62px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .summary-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .summary-box strong {
      display: block;
      margin-top: 5px;
      font-size: 21px;
      line-height: 1.1;
    }

    .service-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #fffdf9;
    }

    .service-bar button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .details {
      overflow-y: auto;
      padding: 10px;
      background: #fffdf9;
    }

    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 7px;
    }

    .detail-table th {
      padding: 0 6px 3px;
      color: var(--muted);
      font-size: 12px;
      text-align: left;
    }

    .detail-table td {
      padding: 9px 6px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
      vertical-align: middle;
    }

    .detail-table td:first-child {
      border-left: 1px solid var(--line);
      border-radius: 8px 0 0 8px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .detail-table td:nth-child(2) {
      text-align: center;
    }

    .detail-table td:last-child {
      border-right: 1px solid var(--line);
      border-radius: 0 8px 8px 0;
      text-align: right;
      white-space: nowrap;
      font-weight: 900;
    }

    .cancel-line {
      min-width: 52px;
      height: 32px;
      border: 1px solid #e1b8b5;
      border-radius: 8px;
      background: #fff5f4;
      color: var(--brand);
      font-size: 13px;
      font-weight: 900;
    }

    .detail-name {
      font-weight: 900;
    }

    .detail-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
    }

    .order-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #faf6f0;
    }

    .secondary,
    .primary {
      min-height: 54px;
      border-radius: 8px;
      font-weight: 900;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: #fff;
      font-size: 17px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      min-width: 260px;
      max-width: calc(100vw - 28px);
      padding: 13px 16px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(36,91,131,.25);
      transform: translateX(-50%) translateY(110px);
      transition: transform .2s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .order {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 10px;
      }

      .menu-head,
      .header,
      .table-line,
      .time-line {
        grid-template-columns: 1fr;
      }

      .search {
        width: 100%;
      }

      .menu-list {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <section class="panel header" aria-label="業務画面ヘッダー">
        <div class="title">
          <h1>従業員用 注文入力</h1>
        </div>
        <div class="order-head">
          <div class="terminal-name">
            <h2>焼肉ホール端末</h2>
            <span>注文リスト</span>
          </div>
          <div class="table-line">
            <div class="field">
              <label for="tableNo">卓番</label>
              <select id="tableNo">
                <option>A-01</option>
                <option>A-02</option>
                <option>A-03</option>
                <option selected>A-12</option>
                <option>B-01</option>
                <option>B-02</option>
                <option>個室-01</option>
              </select>
            </div>
            <div class="field">
              <label for="guests">人数</label>
              <select id="guests">
                <option>1名</option>
                <option>2名</option>
                <option selected>4名</option>
                <option>6名</option>
                <option>8名</option>
              </select>
            </div>
            <div class="field">
              <label for="staff">担当</label>
              <select id="staff">
                <option>佐藤</option>
                <option>鈴木</option>
                <option>田中</option>
                <option>山本</option>
              </select>
            </div>
          </div>
          <div class="time-line">
            <div class="time-card">
              <span>入店時間 / 最初の注文</span>
              <strong id="entryTime">18:00</strong>
            </div>
            <div class="time-card">
              <span>経過</span>
              <strong id="elapsed">00分</strong>
            </div>
          </div>
          <div class="status-strip">
            <div class="field">
              <label for="course">コース</label>
              <select id="course">
                <option>通常</option>
                <option selected>食べ放題 90分</option>
                <option>食べ飲み放題</option>
              </select>
            </div>
            <div class="field">
              <label for="tableStatus">状態</label>
              <select id="tableStatus">
                <option selected>着席中</option>
                <option>会計待ち</option>
                <option>片付け待ち</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <nav class="panel tabs" aria-label="メニューカテゴリ" id="tabs"></nav>

      <section class="panel menu-panel" aria-label="商品入力">
        <div class="menu-head">
          <h2 id="categoryTitle">おすすめ</h2>
          <input class="search" id="search" type="search" placeholder="商品名で検索">
        </div>
        <div class="menu-list" id="menu"></div>
      </section>
    </main>

    <aside class="panel order" aria-label="注文リスト">
      <div class="summary">
        <div class="summary-box">
          <span>明細件数</span>
          <strong id="lineCount">0</strong>
        </div>
        <div class="summary-box">
          <span>商品点数</span>
          <strong id="itemCount">0</strong>
        </div>
        <div class="summary-box">
          <span>合計</span>
          <strong id="total">¥0</strong>
        </div>
      </div>

      <div class="service-bar">
        <button type="button" data-service="網交換を追加しました">網交換</button>
        <button type="button" data-service="お冷を追加しました">お冷</button>
        <button type="button" data-service="スタッフ対応メモを追加しました">対応メモ</button>
      </div>

      <div class="details" id="details"></div>

      <div class="order-actions">
        <button class="secondary" type="button" id="clear">取消</button>
        <button class="primary" type="button" id="send">注文確定</button>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const categories = ["おすすめ", "牛肉", "ホルモン", "豚・鶏", "ご飯物", "一品", "ドリンク"];
    const menuItems = [
      { category: "おすすめ", name: "特選和牛カルビ", price: 1480 },
      { category: "おすすめ", name: "厚切り牛タン", price: 1680 },
      { category: "おすすめ", name: "本日の盛り合わせ", price: 2980 },
      { category: "牛肉", name: "上ロース", price: 1380 },
      { category: "牛肉", name: "やみつきハラミ", price: 1280 },
      { category: "牛肉", name: "壺漬けカルビ", price: 1180 },
      { category: "牛肉", name: "和牛赤身", price: 1320 },
      { category: "ホルモン", name: "上ミノ", price: 920 },
      { category: "ホルモン", name: "丸腸", price: 860 },
      { category: "ホルモン", name: "レバー", price: 780 },
      { category: "ホルモン", name: "シマチョウ", price: 820 },
      { category: "豚・鶏", name: "豚トロ", price: 760 },
      { category: "豚・鶏", name: "鶏せせり", price: 690 },
      { category: "豚・鶏", name: "鶏もも", price: 650 },
      { category: "ご飯物", name: "石焼ビビンバ", price: 980 },
      { category: "ご飯物", name: "冷麺", price: 880 },
      { category: "ご飯物", name: "ライス 中", price: 320 },
      { category: "ご飯物", name: "クッパ", price: 760 },
      { category: "一品", name: "白菜キムチ", price: 420 },
      { category: "一品", name: "チョレギサラダ", price: 620 },
      { category: "一品", name: "ナムル盛り", price: 580 },
      { category: "一品", name: "韓国のり", price: 280 },
      { category: "ドリンク", name: "生ビール", price: 620 },
      { category: "ドリンク", name: "黒ウーロン茶", price: 380 },
      { category: "ドリンク", name: "ハイボール", price: 520 },
      { category: "ドリンク", name: "レモンサワー", price: 500 },
      { category: "ドリンク", name: "コーラ", price: 330 },
      { category: "ドリンク", name: "オレンジジュース", price: 330 }
    ];

    const state = {
      category: "おすすめ",
      qty: new Map(),
      tableNo: "A-12",
      tables: {
        "A-01": {
          guests: "2名",
          course: "通常",
          status: "着席中",
          orders: [
            { id: 101, time: "17:52", name: "生ビール", price: 620, qty: 2, staff: "鈴木" },
            { id: 102, time: "17:55", name: "上ロース", price: 1380, qty: 1, staff: "鈴木" },
            { id: 103, time: "18:03", name: "黒ウーロン茶", price: 380, qty: 1, staff: "鈴木" }
          ]
        },
        "A-12": {
          guests: "4名",
          course: "食べ放題 90分",
          status: "着席中",
          orders: [
            { id: 201, time: "18:04", name: "特選和牛カルビ", price: 1480, qty: 2, staff: "佐藤" },
            { id: 202, time: "18:04", name: "厚切り牛タン", price: 1680, qty: 1, staff: "佐藤" },
            { id: 203, time: "18:07", name: "白菜キムチ", price: 420, qty: 1, staff: "佐藤" },
            { id: 204, time: "18:12", name: "生ビール", price: 620, qty: 4, staff: "佐藤" },
            { id: 205, time: "18:18", name: "やみつきハラミ", price: 1280, qty: 2, staff: "田中" },
            { id: 206, time: "18:24", name: "黒ウーロン茶", price: 380, qty: 2, staff: "田中" }
          ]
        },
        "B-02": {
          guests: "6名",
          course: "食べ飲み放題",
          status: "会計待ち",
          orders: [
            { id: 301, time: "17:35", name: "本日の盛り合わせ", price: 2980, qty: 2, staff: "山本" },
            { id: 302, time: "17:42", name: "レモンサワー", price: 500, qty: 6, staff: "山本" },
            { id: 303, time: "17:58", name: "石焼ビビンバ", price: 980, qty: 3, staff: "佐藤" },
            { id: 304, time: "18:11", name: "ナムル盛り", price: 580, qty: 2, staff: "佐藤" }
          ]
        }
      },
      nextId: 400
    };

    const yen = new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 });
    const tabsEl = document.getElementById("tabs");
    const menuEl = document.getElementById("menu");
    const detailsEl = document.getElementById("details");
    const searchEl = document.getElementById("search");
    const categoryTitleEl = document.getElementById("categoryTitle");
    const toastEl = document.getElementById("toast");

    function itemQty(name) {
      return state.qty.get(name) || 1;
    }

    function currentTable() {
      if (!state.tables[state.tableNo]) {
        state.tables[state.tableNo] = {
          guests: document.getElementById("guests").value,
          course: document.getElementById("course").value,
          status: document.getElementById("tableStatus").value,
          orders: []
        };
      }
      return state.tables[state.tableNo];
    }

    function syncTableControls() {
      const table = currentTable();
      document.getElementById("guests").value = table.guests;
      document.getElementById("course").value = table.course;
      document.getElementById("tableStatus").value = table.status;
    }

    function renderTabs() {
      tabsEl.innerHTML = categories.map(category => `
        <button class="tab ${category === state.category ? "active" : ""}" type="button" data-category="${category}">
          ${category}
        </button>
      `).join("");
    }

    function renderMenu() {
      const keyword = searchEl.value.trim().toLowerCase();
      categoryTitleEl.textContent = state.category;
      const visible = menuItems.filter(item => {
        const categoryMatched = item.category === state.category;
        const keywordMatched = !keyword || item.name.toLowerCase().includes(keyword);
        return categoryMatched && keywordMatched;
      });

      menuEl.innerHTML = visible.map(item => `
        <article class="product-row">
          <div class="product-name">
            <strong>${item.name}</strong>
            <span>${yen.format(item.price)}</span>
          </div>
          <button class="step" type="button" data-dec="${item.name}">−</button>
          <div class="qty">${itemQty(item.name)}</div>
          <button class="step" type="button" data-inc="${item.name}">＋</button>
          <button class="add" type="button" data-add="${item.name}">追加</button>
        </article>
      `).join("");
    }

    function renderDetails() {
      const table = currentTable();
      if (!table.orders.length) {
        detailsEl.innerHTML = `<div class="empty">注文明細はまだありません。<br>左の商品行から数量を選んで追加してください。</div>`;
      } else {
        detailsEl.innerHTML = `
          <table class="detail-table">
            <thead>
              <tr>
                <th>時刻</th>
                <th>取消</th>
                <th>商品</th>
                <th>数量</th>
                <th>金額</th>
              </tr>
            </thead>
            <tbody>
              ${table.orders.map(order => `
                <tr>
                  <td>${order.time}</td>
                  <td><button class="cancel-line" type="button" data-cancel="${order.id}">取消</button></td>
                  <td>
                    <div class="detail-name">${order.name}</div>
                    <div class="detail-sub">担当 ${order.staff}</div>
                  </td>
                  <td>${order.qty}</td>
                  <td>${yen.format(order.price * order.qty)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      const itemCount = table.orders.reduce((sum, order) => sum + order.qty, 0);
      const total = table.orders.reduce((sum, order) => sum + order.price * order.qty, 0);
      document.getElementById("lineCount").textContent = table.orders.length;
      document.getElementById("itemCount").textContent = itemCount;
      document.getElementById("total").textContent = yen.format(total);
      updateTime();
    }

    function findItem(name) {
      return menuItems.find(item => item.name === name);
    }

    function nowText() {
      return new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 1600);
    }

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      state.category = button.dataset.category;
      searchEl.value = "";
      renderTabs();
      renderMenu();
    });

    searchEl.addEventListener("input", renderMenu);

    menuEl.addEventListener("click", event => {
      const dec = event.target.closest("[data-dec]");
      const inc = event.target.closest("[data-inc]");
      const add = event.target.closest("[data-add]");

      if (dec || inc) {
        const name = dec ? dec.dataset.dec : inc.dataset.inc;
        const next = Math.max(1, itemQty(name) + (inc ? 1 : -1));
        state.qty.set(name, next);
        renderMenu();
      }

      if (add) {
        const item = findItem(add.dataset.add);
        const qty = itemQty(item.name);
        currentTable().orders.push({
          id: state.nextId++,
          time: nowText(),
          name: item.name,
          price: item.price,
          qty,
          staff: document.getElementById("staff").value
        });
        showToast(`${item.name} ${qty}点を追加`);
        renderDetails();
      }
    });

    detailsEl.addEventListener("click", event => {
      const button = event.target.closest("[data-cancel]");
      if (!button) return;
      const table = currentTable();
      const id = Number(button.dataset.cancel);
      table.orders = table.orders.filter(order => order.id !== id);
      showToast("明細を取り消しました");
      renderDetails();
    });

    document.querySelectorAll("[data-service]").forEach(button => {
      button.addEventListener("click", () => showToast(button.dataset.service));
    });

    document.getElementById("clear").addEventListener("click", () => {
      currentTable().orders.pop();
      showToast("直近の明細を取り消しました");
      renderDetails();
    });

    document.getElementById("send").addEventListener("click", () => {
      showToast(`${document.getElementById("tableNo").value} の注文を確定しました`);
    });

    document.getElementById("tableNo").addEventListener("change", event => {
      state.tableNo = event.target.value;
      syncTableControls();
      renderDetails();
      showToast(`${state.tableNo} の明細を表示`);
    });

    ["guests", "course", "tableStatus"].forEach(id => {
      document.getElementById(id).addEventListener("change", event => {
        const table = currentTable();
        if (id === "guests") table.guests = event.target.value;
        if (id === "course") table.course = event.target.value;
        if (id === "tableStatus") table.status = event.target.value;
      });
    });

    function updateTime() {
      const firstOrder = currentTable().orders[0];
      document.getElementById("entryTime").textContent = firstOrder ? firstOrder.time : "--:--";
      const [hour, minute] = firstOrder ? firstOrder.time.split(":").map(Number) : [new Date().getHours(), new Date().getMinutes()];
      const entryDate = new Date();
      entryDate.setHours(hour, minute, 0, 0);
      const minutes = firstOrder ? Math.max(0, Math.floor((new Date() - entryDate) / 60000)) : 0;
      document.getElementById("elapsed").textContent = `${minutes}分`;
    }

    document.getElementById("tableNo").value = state.tableNo;
    syncTableControls();
    renderTabs();
    renderMenu();
    renderDetails();
    updateTime();
    window.setInterval(updateTime, 30000);
  </script>
</body>
</html>

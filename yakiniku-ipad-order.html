<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>焼肉店 従業員用注文入力</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --panel: #fffdf9;
      --ink: #211d1a;
      --muted: #716963;
      --line: #d9d0c7;
      --soft: #eee8e0;
      --brand: #a8221d;
      --brand-dark: #741714;
      --green: #0f766e;
      --blue: #245b83;
      --gold: #b47a22;
      --shadow: 0 12px 28px rgba(39, 32, 27, .1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(135deg, #f7f3ee 0%, #ece7df 54%, #eef3f1 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 500px;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 249, .92);
      box-shadow: var(--shadow);
    }

    .main {
      display: contents;
    }

    .header {
      grid-column: 1 / -1;
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 10px 12px;
      overflow-x: auto;
    }

    .title {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .compact-meta {
      display: flex;
      flex: 1 1 auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      white-space: nowrap;
    }

    .compact-field {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      min-height: 36px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .compact-field select {
      min-width: 76px;
      height: 28px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
      outline: 0;
    }

    .compact-field strong {
      color: var(--ink);
      font-size: 14px;
    }

    .tabs {
      grid-column: 1;
      display: grid;
      grid-template-columns: repeat(7, minmax(92px, 1fr));
      gap: 8px;
      padding: 9px;
      overflow-x: auto;
    }

    .tab {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
    }

    .tab.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .menu-panel {
      grid-column: 1;
      display: grid;
      grid-template-rows: 1fr;
      min-height: 0;
      overflow: hidden;
    }

    .menu-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      align-content: start;
      padding: 8px;
      overflow-y: auto;
    }

    .product-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 48px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .product-name {
      min-width: 0;
    }

    .product-name {
      display: flex;
      gap: 8px;
      align-items: baseline;
      min-width: 0;
    }

    .product-name strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
    }

    .product-name span {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .add {
      height: 36px;
      border-radius: 8px;
      font-weight: 900;
    }

    .add {
      border: 0;
      background: var(--green);
      color: #fff;
      font-size: 14px;
    }

    .order {
      grid-column: 2;
      grid-row: 2 / 4;
      position: sticky;
      top: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      max-height: calc(100vh - 32px);
      overflow: hidden;
    }

    .order-head {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: #2b2622;
      color: #fff;
    }

    .header .order-head {
      padding: 12px;
      box-shadow: none;
    }

    .terminal-name {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .terminal-name h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .terminal-name span {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: rgba(255,255,255,.8);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .table-line {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      background: rgba(255,255,255,.1);
      color: #fff;
      padding: 0 10px;
      font-weight: 900;
    }

    .field select option {
      color: var(--ink);
    }

    .time-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .time-card {
      min-height: 54px;
      padding: 9px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.1);
    }

    .time-card span {
      display: block;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      font-weight: 800;
    }

    .time-card strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #faf6f0;
    }

    .status-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #fffdf9;
    }

    .status-strip .field {
      gap: 4px;
    }

    .status-strip label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .order-head .status-strip {
      padding: 0;
      border-bottom: 0;
      background: transparent;
    }

    .order-head .status-strip label {
      color: rgba(255,255,255,.72);
    }

    .order-head .status-strip select {
      border-color: rgba(255,255,255,.22);
      background: rgba(255,255,255,.1);
      color: #fff;
    }

    .order-head .status-strip select option {
      color: var(--ink);
    }

    .status-strip select {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 9px;
      color: var(--ink);
      font-weight: 900;
    }

    .summary-box {
      min-height: 62px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .summary-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .summary-box strong {
      display: block;
      margin-top: 5px;
      font-size: 21px;
      line-height: 1.1;
    }

    .details {
      overflow-y: auto;
      padding: 10px;
      background: #fffdf9;
    }

    .detail-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 7px;
    }

    .detail-table th {
      padding: 0 6px 3px;
      color: var(--muted);
      font-size: 12px;
      text-align: left;
    }

    .detail-table td {
      padding: 9px 6px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      font-size: 14px;
      vertical-align: middle;
    }

    .detail-table td:first-child {
      border-left: 1px solid var(--line);
      border-radius: 8px 0 0 8px;
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .detail-table td:nth-child(2) {
      text-align: center;
    }

    .detail-table td:nth-child(4) {
      min-width: 138px;
    }

    .detail-table td:last-child {
      border-right: 1px solid var(--line);
      border-radius: 0 8px 8px 0;
      text-align: right;
      white-space: nowrap;
      font-weight: 900;
    }

    .cancel-line {
      min-width: 52px;
      height: 32px;
      border: 1px solid #e1b8b5;
      border-radius: 8px;
      background: #fff5f4;
      color: var(--brand);
      font-size: 13px;
      font-weight: 900;
    }

    .line-qty {
      display: grid;
      grid-template-columns: 34px 54px 34px;
      gap: 5px;
      align-items: center;
    }

    .line-step,
    .line-input {
      height: 34px;
      border-radius: 8px;
      font-weight: 900;
    }

    .line-step {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--ink);
      font-size: 18px;
    }

    .line-input {
      width: 54px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: center;
      font-size: 15px;
    }

    .line-input::-webkit-outer-spin-button,
    .line-input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .detail-name {
      font-weight: 900;
    }

    .detail-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .time-staff {
      display: inline-grid;
      grid-template-columns: auto auto;
      gap: 5px;
      align-items: center;
    }

    .time-staff strong {
      color: var(--muted);
      font-size: 14px;
    }

    .staff-vertical {
      writing-mode: vertical-rl;
      line-height: 1;
      color: var(--brand);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 260px;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
    }

    .order-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #faf6f0;
    }

    .secondary,
    .primary {
      min-height: 54px;
      border-radius: 8px;
      font-weight: 900;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .primary {
      border: 0;
      background: var(--brand);
      color: #fff;
      font-size: 17px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      min-width: 260px;
      max-width: calc(100vw - 28px);
      padding: 13px 16px;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(36,91,131,.25);
      transform: translateX(-50%) translateY(110px);
      transition: transform .2s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(33, 29, 26, .42);
    }

    .image-modal.show {
      display: grid;
    }

    .image-dialog {
      display: grid;
      gap: 12px;
      width: min(520px, calc(100vw - 32px));
      max-height: calc(100vh - 36px);
      padding: 14px;
      border-radius: 8px;
      background: #fffdf9;
      box-shadow: 0 18px 44px rgba(0,0,0,.22);
    }

    .image-dialog img {
      width: 100%;
      max-height: calc(100vh - 170px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      object-fit: contain;
    }

    .image-dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .image-dialog-actions a,
    .image-dialog-actions button {
      display: grid;
      place-items: center;
      min-height: 46px;
      border-radius: 8px;
      font-weight: 900;
      text-decoration: none;
    }

    .image-dialog-actions a {
      background: var(--brand);
      color: #fff;
    }

    .image-dialog-actions button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
      }

      .order {
        grid-column: 1;
        grid-row: auto;
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 10px;
      }

      .table-line,
      .time-line {
        grid-template-columns: 1fr;
      }

      .header,
      .compact-meta {
        align-items: stretch;
        flex-direction: column;
      }

      .menu-list {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <section class="panel header" aria-label="業務画面ヘッダー">
        <div class="title">
          <h1>従業員用 注文入力</h1>
        </div>
        <div class="compact-meta">
          <label class="compact-field">担当:
            <select id="staff">
              <option>佐藤</option>
              <option>鈴木</option>
              <option>田中</option>
              <option>山本</option>
            </select>
          </label>
          <label class="compact-field">卓番:
            <select id="tableNo">
              <option>A-01</option>
              <option>A-02</option>
              <option>A-03</option>
              <option selected>A-12</option>
              <option>B-01</option>
              <option>B-02</option>
              <option>個室-01</option>
            </select>
          </label>
          <label class="compact-field">人数:
            <select id="guests">
              <option>1名</option>
              <option>2名</option>
              <option selected>4名</option>
              <option>6名</option>
              <option>8名</option>
            </select>
          </label>
          <span class="compact-field">入店時間:<strong id="entryTime">18:00</strong></span>
          <span class="compact-field">経過:<strong id="elapsed">00分</strong></span>
          <label class="compact-field">コース:
            <select id="course">
              <option>通常</option>
              <option selected>食べ放題 90分</option>
              <option>食べ飲み放題</option>
            </select>
          </label>
          <label class="compact-field">状態:
            <select id="tableStatus">
              <option selected>着席中</option>
              <option>会計待ち</option>
              <option>片付け待ち</option>
            </select>
          </label>
        </div>
      </section>

      <nav class="panel tabs" aria-label="メニューカテゴリ" id="tabs"></nav>

      <section class="panel menu-panel" aria-label="商品入力">
        <div class="menu-list" id="menu"></div>
      </section>
    </main>

    <aside class="panel order" aria-label="注文リスト">
      <div class="summary">
        <div class="summary-box">
          <span>明細件数</span>
          <strong id="lineCount">0</strong>
        </div>
        <div class="summary-box">
          <span>商品点数</span>
          <strong id="itemCount">0</strong>
        </div>
        <div class="summary-box">
          <span>合計</span>
          <strong id="total">¥0</strong>
        </div>
      </div>

      <div class="details" id="details"></div>

      <div class="order-actions">
        <button class="secondary" type="button" id="settlement">注文明細画像</button>
        <button class="primary" type="button" id="receiptImage">清算領収明細画像</button>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="image-modal" id="imageModal" aria-hidden="true">
    <div class="image-dialog" role="dialog" aria-modal="true" aria-label="明細画像プレビュー">
      <img id="generatedImage" alt="生成した明細画像">
      <div class="image-dialog-actions">
        <a id="downloadImage" href="#" download="meisai.png">画像保存</a>
        <button type="button" id="closeImage">閉じる</button>
      </div>
    </div>
  </div>

      nextId: 400
    };

    const yen = new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 });
    const tabsEl = document.getElementById("tabs");
    const menuEl = document.getElementById("menu");
    const detailsEl = document.getElementById("details");
    const toastEl = document.getElementById("toast");
    const imageModalEl = document.getElementById("imageModal");
    const generatedImageEl = document.getElementById("generatedImage");
    const downloadImageEl = document.getElementById("downloadImage");

    function currentTable() {
      if (!state.tables[state.tableNo]) {
        state.tables[state.tableNo] = {
          guests: document.getElementById("guests").value,
          course: document.getElementById("course").value,
          status: document.getElementById("tableStatus").value,
          orders: []
        };
      }
      return state.tables[state.tableNo];
    }

    function syncTableControls() {
      const table = currentTable();
      document.getElementById("guests").value = table.guests;
      document.getElementById("course").value = table.course;
      document.getElementById("tableStatus").value = table.status;
    }

    function renderTabs() {
      tabsEl.innerHTML = categories.map(category => `
        <button class="tab ${category === state.category ? "active" : ""}" type="button" data-category="${category}">
          ${category}
        </button>
      `).join("");
    }

    function renderMenu() {
      const visible = menuItems.filter(item => item.category === state.category);

      menuEl.innerHTML = visible.map(item => `
        <article class="product-row">
          <button class="add" type="button" data-add="${item.name}">追加</button>
          <div class="product-name">
            <strong>${item.name}</strong>
            <span>${yen.format(item.price)}</span>
          </div>
        </article>
      `).join("");
    }

    function renderDetails() {
      const table = currentTable();
      if (!table.orders.length) {
        detailsEl.innerHTML = `<div class="empty">注文明細はまだありません。<br>左の商品行の追加を押してください。</div>`;
      } else {
        detailsEl.innerHTML = `
          <table class="detail-table">
            <thead>
              <tr>
                <th>時刻</th>
                <th>取消</th>
                <th>商品</th>
                <th>数量</th>
                <th>金額</th>
              </tr>
            </thead>
            <tbody>
              ${table.orders.map(order => `
                <tr>
                  <td>
                    <span class="time-staff">
                      <strong>${order.time}</strong>
                      <span class="staff-vertical">${order.staff}</span>
                    </span>
                  </td>
                  <td><button class="cancel-line" type="button" data-cancel="${order.id}">取消</button></td>
                  <td>
                    <div class="detail-name">${order.name}</div>
                  </td>
                  <td>
                    <div class="line-qty">
                      <button class="line-step" type="button" data-line-dec="${order.id}">−</button>
                      <input class="line-input" type="number" min="1" max="99" inputmode="numeric" value="${order.qty}" data-line-qty="${order.id}" aria-label="${order.name}の数量">
                      <button class="line-step" type="button" data-line-inc="${order.id}">＋</button>
                    </div>
                  </td>
                  <td>${yen.format(order.price * order.qty)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      }

      const itemCount = table.orders.reduce((sum, order) => sum + order.qty, 0);
      const total = table.orders.reduce((sum, order) => sum + order.price * order.qty, 0);
      document.getElementById("lineCount").textContent = table.orders.length;
      document.getElementById("itemCount").textContent = itemCount;
      document.getElementById("total").textContent = yen.format(total);
      updateTime();
    }

    function findItem(name) {
      return menuItems.find(item => item.name === name);
    }

    function nowText() {
      return new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function minutesFromTimeText(timeText) {
      const [hour, minute] = timeText.split(":").map(Number);
      return hour * 60 + minute;
    }

    function isWithinOneMinute(baseTime, targetTime) {
      const diff = minutesFromTimeText(targetTime) - minutesFromTimeText(baseTime);
      return diff >= 0 && diff <= 1;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 1600);
    }

    function createDetailImage(title, options = {}) {
      const orders = currentTable().orders;
      if (!orders.length) {
        showToast("明細がありません");
        return;
      }

      const width = 760;
      const rowHeight = 48;
      const receiptExtraHeight = options.receipt ? 250 : 0;
      const height = 126 + rowHeight * orders.length + receiptExtraHeight;
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      const total = orders.reduce((sum, order) => sum + order.price * order.qty, 0);
      const taxable = Math.round(total / 1.1);
      const tax = total - taxable;

      ctx.fillStyle = "#fffdf9";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#211d1a";
      ctx.font = "bold 34px sans-serif";
      ctx.fillText(title, 32, 52);

      ctx.strokeStyle = "#d9d0c7";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(32, 76);
      ctx.lineTo(width - 32, 76);
      ctx.stroke();

      ctx.font = "bold 18px sans-serif";
      ctx.fillStyle = "#716963";
      ctx.fillText("品名", 44, 102);
      ctx.fillText("数量", 440, 102);
      ctx.fillText("金額", 584, 102);

      let y = 136;
      orders.forEach((order, index) => {
        if (index % 2 === 0) {
          ctx.fillStyle = "#f7f1eb";
          ctx.fillRect(32, y - 31, width - 64, rowHeight);
        }

        ctx.fillStyle = "#211d1a";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText(order.name, 44, y);
        ctx.textAlign = "right";
        ctx.fillText(String(order.qty), 492, y);
        ctx.fillText(yen.format(order.price * order.qty), width - 44, y);
        ctx.textAlign = "left";
        y += rowHeight;
      });

      if (options.receipt) {
        y += 8;
        ctx.strokeStyle = "#d9d0c7";
        ctx.beginPath();
        ctx.moveTo(32, y);
        ctx.lineTo(width - 32, y);
        ctx.stroke();

        y += 34;
        ctx.fillStyle = "#211d1a";
        ctx.font = "bold 22px sans-serif";
        ctx.fillText(`受領金額（税込） ${yen.format(total)}`, 44, y);

        y += 34;
        ctx.font = "18px sans-serif";
        ctx.fillStyle = "#211d1a";
        ctx.fillText(`内課税金額 ${yen.format(taxable)}`, 44, y);
        ctx.fillText(`内消費税（10%） ${yen.format(tax)}`, 360, y);

        y += 36;
        ctx.fillText("但し書き 焼肉ご飲食代として", 44, y);

        y += 42;
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("事業者名称 炭火焼肉 こだわり亭", 44, y);

        y += 28;
        ctx.font = "16px sans-serif";
        ctx.fillStyle = "#211d1a";
        ctx.fillText("住所 東京都中央区銀座1-2-3 こだわりビル1F", 44, y);

        y += 26;
        ctx.fillText("電話番号 03-1234-5678", 44, y);
        ctx.fillText("登録番号 T1234567890123", 360, y);
      }

      const imageUrl = canvas.toDataURL("image/png");
      generatedImageEl.src = imageUrl;
      downloadImageEl.href = imageUrl;
      downloadImageEl.download = `${title}-${state.tableNo}.png`;
      imageModalEl.classList.add("show");
      imageModalEl.setAttribute("aria-hidden", "false");
      showToast(`${title}を作成しました`);
    }

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      state.category = button.dataset.category;
      renderTabs();
      renderMenu();
    });

    menuEl.addEventListener("click", event => {
      const add = event.target.closest("[data-add]");

      if (add) {
        const item = findItem(add.dataset.add);
        const table = currentTable();
        const currentTime = nowText();
        const lastOrder = table.orders[table.orders.length - 1];

        if (lastOrder && lastOrder.name === item.name && isWithinOneMinute(lastOrder.time, currentTime)) {
          lastOrder.qty = Math.min(99, lastOrder.qty + 1);
          lastOrder.staff = document.getElementById("staff").value;
          showToast(`${item.name}の数量を${lastOrder.qty}に更新`);
        } else {
          table.orders.push({
            id: state.nextId++,
            time: currentTime,
            name: item.name,
            price: item.price,
            qty: 1,
            staff: document.getElementById("staff").value
          });
          showToast(`${item.name}を追加`);
        }
        renderDetails();
      }
    });

    detailsEl.addEventListener("click", event => {
      const cancel = event.target.closest("[data-cancel]");
      const dec = event.target.closest("[data-line-dec]");
      const inc = event.target.closest("[data-line-inc]");
      const table = currentTable();

      if (cancel) {
        const id = Number(cancel.dataset.cancel);
        table.orders = table.orders.filter(order => order.id !== id);
        showToast("明細を取り消しました");
        renderDetails();
        return;
      }

      if (dec || inc) {
        const id = Number(dec ? dec.dataset.lineDec : inc.dataset.lineInc);
        const order = table.orders.find(line => line.id === id);
        if (!order) return;
        order.qty = Math.max(1, Math.min(99, order.qty + (inc ? 1 : -1)));
        renderDetails();
      }
    });

    detailsEl.addEventListener("change", event => {
      const input = event.target.closest("[data-line-qty]");
      if (!input) return;
      const order = currentTable().orders.find(line => line.id === Number(input.dataset.lineQty));
      if (!order) return;
      order.qty = Math.max(1, Math.min(99, Number(input.value) || 1));
      renderDetails();
    });

    document.getElementById("settlement").addEventListener("click", () => {
      createDetailImage("注文明細画像");
    });

    document.getElementById("receiptImage").addEventListener("click", () => {
      createDetailImage("清算領収明細画像", { receipt: true });
    });

    document.getElementById("closeImage").addEventListener("click", () => {
      imageModalEl.classList.remove("show");
      imageModalEl.setAttribute("aria-hidden", "true");
    });

    imageModalEl.addEventListener("click", event => {
      if (event.target === imageModalEl) {
        imageModalEl.classList.remove("show");
        imageModalEl.setAttribute("aria-hidden", "true");
      }
    });

    document.getElementById("tableNo").addEventListener("change", event => {
      state.tableNo = event.target.value;
      syncTableControls();
      renderDetails();
      showToast(`${state.tableNo} の明細を表示`);
    });

    ["guests", "course", "tableStatus"].forEach(id => {
      document.getElementById(id).addEventListener("change", event => {
        const table = currentTable();
        if (id === "guests") table.guests = event.target.value;
        if (id === "course") table.course = event.target.value;
        if (id === "tableStatus") table.status = event.target.value;
      });
    });

    function updateTime() {
      const firstOrder = currentTable().orders[0];
      document.getElementById("entryTime").textContent = firstOrder ? firstOrder.time : "--:--";
      const [hour, minute] = firstOrder ? firstOrder.time.split(":").map(Number) : [new Date().getHours(), new Date().getMinutes()];
      const entryDate = new Date();
      entryDate.setHours(hour, minute, 0, 0);
      const minutes = firstOrder ? Math.max(0, Math.floor((new Date() - entryDate) / 60000)) : 0;
      document.getElementById("elapsed").textContent = `${minutes}分`;
    }

    document.getElementById("tableNo").value = state.tableNo;
    syncTableControls();
    renderTabs();
    renderMenu();
    renderDetails();
    updateTime();
    window.setInterval(updateTime, 30000);
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>焼肉店 iPadオーダー</title>
  <style>
    :root {
      --ink: #201b18;
      --muted: #6d625b;
      --line: #ded6cf;
      --paper: #fbf8f4;
      --panel: #fffdf9;
      --brand: #b42820;
      --brand-dark: #7e1714;
      --accent: #0f766e;
      --gold: #c48a28;
      --charcoal: #27221f;
      --ok: #16803c;
      --shadow: 0 18px 45px rgba(39, 34, 31, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(196, 138, 40, .16), transparent 27%),
        linear-gradient(135deg, #f7efe7 0%, #fdfaf5 52%, #edf4f2 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
      min-height: 100vh;
      padding: 22px;
    }

    .main {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar,
    .cart,
    .tabs,
    .menu-grid,
    .status-row {
      border: 1px solid rgba(222, 214, 207, .78);
      background: rgba(255, 253, 249, .88);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: stretch;
      overflow: hidden;
      border-radius: 8px;
    }

    .brand-block {
      padding: 22px 24px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--brand);
      font-size: 15px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.12;
    }

    .table-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .hero {
      position: relative;
      overflow: hidden;
      width: 310px;
      min-height: 172px;
      background:
        radial-gradient(circle at 70% 36%, rgba(255,255,255,.24), transparent 18%),
        linear-gradient(135deg, #392720 0%, #8c2b21 42%, #d59c43 100%);
    }

    .grill {
      position: absolute;
      left: 28px;
      bottom: 22px;
      width: 152px;
      height: 104px;
      border-radius: 50%;
      background:
        repeating-linear-gradient(90deg, transparent 0 11px, rgba(255,255,255,.42) 12px 15px),
        radial-gradient(circle, #191513 0 44%, #4a3730 45% 62%, #191513 63%);
      box-shadow: 0 18px 38px rgba(0,0,0,.34);
      transform: rotate(-8deg);
    }

    .grill::before,
    .grill::after {
      content: "";
      position: absolute;
      width: 72px;
      height: 42px;
      border-radius: 48% 52% 46% 54%;
      background: linear-gradient(135deg, #f0b1a1, #9b2924 62%, #5f1818);
      box-shadow: inset 8px -7px 0 rgba(255,255,255,.22);
    }

    .grill::before {
      left: 26px;
      top: 24px;
      transform: rotate(14deg);
    }

    .grill::after {
      right: 22px;
      bottom: 22px;
      transform: rotate(-18deg);
    }

    .plate {
      position: absolute;
      right: 22px;
      top: 20px;
      width: 116px;
      height: 82px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #f9eee0 0 42%, #fdfbf7 43% 68%, #d7c7b5 69%);
      box-shadow: 0 14px 28px rgba(0,0,0,.18);
      transform: rotate(9deg);
    }

    .plate span {
      position: absolute;
      width: 52px;
      height: 31px;
      border-radius: 45% 55% 48% 52%;
      background: linear-gradient(135deg, #f2c2b6, #b4342c 68%, #6d1f1c);
      box-shadow: inset 8px -5px 0 rgba(255,255,255,.2);
    }

    .plate span:nth-child(1) {
      left: 18px;
      top: 18px;
      transform: rotate(-12deg);
    }

    .plate span:nth-child(2) {
      right: 18px;
      top: 26px;
      transform: rotate(16deg);
    }

    .sauce {
      position: absolute;
      right: 42px;
      bottom: 22px;
      width: 54px;
      height: 39px;
      border-radius: 50%;
      background: radial-gradient(circle, #4a1f16 0 42%, #fff9ef 43% 66%, #c9b49c 67%);
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(82px, 1fr));
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .tab {
      min-height: 50px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }

    .tab.active {
      border-color: rgba(180, 40, 32, .28);
      background: var(--brand);
      color: #fff;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      align-content: start;
      padding: 14px;
      border-radius: 8px;
      overflow-y: auto;
    }

    .item {
      display: grid;
      grid-template-rows: 138px 1fr auto;
      min-height: 300px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .item-photo {
      position: relative;
      display: grid;
      place-items: center;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(135deg, var(--photo-a), var(--photo-b)),
        radial-gradient(circle at 30% 28%, rgba(255,255,255,.3), transparent 23%);
    }

    .item-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.22));
      z-index: -1;
    }

    .item-visual {
      width: 94px;
      height: 74px;
      border-radius: 46% 54% 48% 52%;
      background: var(--meat);
      box-shadow:
        inset 0 0 0 8px rgba(255,255,255,.28),
        inset 16px -10px 28px rgba(80, 18, 12, .22),
        0 14px 28px rgba(0,0,0,.2);
      transform: rotate(-8deg);
    }

    .item-body {
      padding: 14px;
    }

    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 8px;
    }

    .item h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.25;
    }

    .price {
      white-space: nowrap;
      color: var(--brand);
      font-size: 18px;
      font-weight: 900;
    }

    .desc {
      margin: 0;
      min-height: 44px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .item-actions {
      display: grid;
      grid-template-columns: 42px 1fr 42px 1fr;
      gap: 8px;
      padding: 0 14px 14px;
      align-items: center;
    }

    .qty-btn,
    .add-btn,
    .action-btn,
    .checkout-btn {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 900;
    }

    .qty-btn {
      height: 42px;
      background: #ede6dd;
      color: var(--ink);
      font-size: 23px;
    }

    .qty {
      display: grid;
      place-items: center;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-weight: 900;
    }

    .add-btn {
      height: 42px;
      background: var(--charcoal);
      color: #fff;
    }

    .cart {
      position: sticky;
      top: 22px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      max-height: calc(100vh - 44px);
      border-radius: 8px;
      overflow: hidden;
    }

    .cart-head {
      padding: 20px;
      background: var(--charcoal);
      color: #fff;
    }

    .cart-head h2 {
      margin: 0;
      font-size: 25px;
    }

    .cart-head p {
      margin: 7px 0 0;
      color: rgba(255,255,255,.72);
      font-size: 14px;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      border-width: 0 0 1px;
      border-radius: 0;
      box-shadow: none;
    }

    .status {
      padding: 10px 8px;
      border-radius: 8px;
      background: #f3eee8;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .cart-list {
      min-height: 220px;
      padding: 12px;
      overflow-y: auto;
    }

    .empty {
      display: grid;
      place-items: center;
      height: 100%;
      min-height: 260px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .cart-item + .cart-item {
      margin-top: 8px;
    }

    .cart-name {
      margin: 0 0 4px;
      font-weight: 900;
    }

    .cart-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .cart-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .mini {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7f1eb;
      font-weight: 900;
      cursor: pointer;
    }

    .cart-foot {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 900;
    }

    .total {
      color: var(--brand);
      font-size: 28px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn {
      min-height: 50px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .checkout-btn {
      min-height: 58px;
      background: var(--brand);
      color: #fff;
      font-size: 18px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 10;
      transform: translateX(-50%) translateY(120px);
      min-width: 280px;
      max-width: min(560px, calc(100vw - 32px));
      padding: 14px 18px;
      border-radius: 8px;
      background: var(--ok);
      color: #fff;
      text-align: center;
      box-shadow: 0 14px 32px rgba(22,128,60,.28);
      transition: transform .22s ease;
      font-weight: 800;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .cart {
        position: static;
        max-height: none;
      }

      .menu-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 700px) {
      .app {
        padding: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .hero {
        width: 100%;
        min-height: 145px;
      }

      h1 {
        font-size: 27px;
      }

      .tabs {
        grid-template-columns: repeat(7, minmax(92px, 1fr));
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <section class="topbar" aria-label="店舗情報">
        <div class="brand-block">
          <p class="eyebrow">炭火焼肉 こだわり亭</p>
          <h1>テーブルからそのまま注文</h1>
          <div class="table-meta">
            <span class="pill">卓番 A-12</span>
            <span class="pill">人数 4名</span>
            <span class="pill">食べ放題 90分</span>
            <span class="pill" id="clock">--:--</span>
          </div>
        </div>
        <div class="hero" role="img" aria-label="焼肉の卓上イメージ">
          <div class="plate"><span></span><span></span></div>
          <div class="grill"></div>
          <div class="sauce"></div>
        </div>
      </section>

      <nav class="tabs" aria-label="メニューカテゴリ" id="tabs"></nav>
      <section class="menu-grid" aria-label="メニュー一覧" id="menu"></section>
    </main>

    <aside class="cart" aria-label="注文内容">
      <div class="cart-head">
        <h2>注文リスト</h2>
        <p>数量を確認して「注文する」を押してください。</p>
      </div>
      <div class="status-row">
        <div class="status">網交換</div>
        <div class="status">お水</div>
        <div class="status">スタッフ</div>
      </div>
      <div class="cart-list" id="cart"></div>
      <div class="cart-foot">
        <div class="total-row">
          <span>小計</span>
          <span class="total" id="total">¥0</span>
        </div>
        <div class="actions">
          <button class="action-btn" type="button" data-service="網交換を依頼しました">網交換</button>
          <button class="action-btn" type="button" data-service="スタッフを呼び出しました">呼び出し</button>
        </div>
        <button class="checkout-btn" type="button" id="checkout">注文する</button>
      </div>
    </aside>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const categories = ["おすすめ", "牛肉", "ホルモン", "豚・鶏", "ご飯物", "一品", "ドリンク"];
    const menuItems = [
      { category: "おすすめ", name: "特選和牛カルビ", price: 1480, desc: "脂の甘みが広がる人気部位。まずは塩でどうぞ。", meat: "#b93d34", a: "#7e1714", b: "#e0a64a" },
      { category: "おすすめ", name: "厚切り牛タン", price: 1680, desc: "食感を楽しむ厚切り仕立て。レモン付き。", meat: "#c76d5a", a: "#23443f", b: "#d9a545" },
      { category: "おすすめ", name: "本日の盛り合わせ", price: 2980, desc: "カルビ、ロース、ハラミを少しずつ楽しめます。", meat: "#9f2f2b", a: "#33251f", b: "#b42820" },
      { category: "牛肉", name: "上ロース", price: 1380, desc: "赤身の旨みとやわらかさを両立した定番。", meat: "#a63732", a: "#5a2d24", b: "#d7b56a" },
      { category: "牛肉", name: "やみつきハラミ", price: 1280, desc: "タレとの相性が抜群。ご飯が進む一皿です。", meat: "#8f2c29", a: "#372b28", b: "#a94428" },
      { category: "牛肉", name: "壺漬けカルビ", price: 1180, desc: "果実だれに漬け込んだ香ばしいカルビ。", meat: "#b74a32", a: "#6f2018", b: "#0f766e" },
      { category: "ホルモン", name: "上ミノ", price: 920, desc: "歯切れのよい食感。味噌だれで仕上げます。", meat: "#e3cab2", a: "#66513f", b: "#c48a28" },
      { category: "ホルモン", name: "丸腸", price: 860, desc: "外は香ばしく、中はとろける濃厚な甘み。", meat: "#f0d5bd", a: "#27221f", b: "#b42820" },
      { category: "ホルモン", name: "レバー", price: 780, desc: "新鮮な旨み。焼きすぎずにお楽しみください。", meat: "#6e2022", a: "#281819", b: "#9d3a24" },
      { category: "豚・鶏", name: "豚トロ", price: 760, desc: "ジューシーで軽い歯ごたえ。塩だれがおすすめ。", meat: "#d88c70", a: "#75342c", b: "#d9ba6a" },
      { category: "豚・鶏", name: "鶏せせり", price: 690, desc: "ぷりっとした食感と香ばしい脂が魅力。", meat: "#d6a064", a: "#7b4e25", b: "#0f766e" },
      { category: "ご飯物", name: "石焼ビビンバ", price: 980, desc: "熱々の石鍋で混ぜる締めの定番。", meat: "#d18a38", a: "#302a25", b: "#7ea34b" },
      { category: "ご飯物", name: "冷麺", price: 880, desc: "さっぱりスープと弾力のある麺。", meat: "#e8d4a8", a: "#1d5d59", b: "#e6ebe9" },
      { category: "一品", name: "白菜キムチ", price: 420, desc: "辛みと旨みのバランスがよい自家製。", meat: "#c43a26", a: "#982115", b: "#e1c150" },
      { category: "一品", name: "チョレギサラダ", price: 620, desc: "焼肉の合間に食べたい香味サラダ。", meat: "#52984c", a: "#0f766e", b: "#cedf8f" },
      { category: "ドリンク", name: "生ビール", price: 620, desc: "焼肉に合うすっきりした一杯。", meat: "#efbd45", a: "#c48a28", b: "#f6e9bb" },
      { category: "ドリンク", name: "黒烏龍茶", price: 380, desc: "脂の多いお肉と相性のよい定番茶。", meat: "#4c3026", a: "#27221f", b: "#8a6b4c" }
    ];

    const state = {
      category: "おすすめ",
      draftQty: new Map(),
      cart: new Map()
    };

    const yen = new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 });
    const tabsEl = document.getElementById("tabs");
    const menuEl = document.getElementById("menu");
    const cartEl = document.getElementById("cart");
    const totalEl = document.getElementById("total");
    const toastEl = document.getElementById("toast");

    function renderTabs() {
      tabsEl.innerHTML = categories.map(category => `
        <button class="tab ${category === state.category ? "active" : ""}" type="button" data-category="${category}">
          ${category}
        </button>
      `).join("");
    }

    function renderMenu() {
      const visible = menuItems.filter(item => item.category === state.category);
      menuEl.innerHTML = visible.map(item => {
        const qty = state.draftQty.get(item.name) || 1;
        return `
          <article class="item">
            <div class="item-photo" style="--photo-a:${item.a};--photo-b:${item.b};--meat:${item.meat}">
              <div class="item-visual" aria-hidden="true"></div>
            </div>
            <div class="item-body">
              <div class="item-title">
                <h2>${item.name}</h2>
                <span class="price">${yen.format(item.price)}</span>
              </div>
              <p class="desc">${item.desc}</p>
            </div>
            <div class="item-actions">
              <button class="qty-btn" type="button" data-dec="${item.name}">−</button>
              <span class="qty">${qty}</span>
              <button class="qty-btn" type="button" data-inc="${item.name}">＋</button>
              <button class="add-btn" type="button" data-add="${item.name}">追加</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderCart() {
      const lines = [...state.cart.values()];
      if (!lines.length) {
        cartEl.innerHTML = `<div class="empty">まだ商品が入っていません。<br>メニューから追加してください。</div>`;
      } else {
        cartEl.innerHTML = lines.map(line => `
          <div class="cart-item">
            <div>
              <p class="cart-name">${line.name}</p>
              <span class="cart-sub">${yen.format(line.price)} × ${line.qty}</span>
            </div>
            <div class="cart-controls">
              <button class="mini" type="button" data-cart-dec="${line.name}">−</button>
              <strong>${line.qty}</strong>
              <button class="mini" type="button" data-cart-inc="${line.name}">＋</button>
            </div>
          </div>
        `).join("");
      }

      const total = lines.reduce((sum, line) => sum + line.price * line.qty, 0);
      totalEl.textContent = yen.format(total);
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    function findItem(name) {
      return menuItems.find(item => item.name === name);
    }

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      state.category = button.dataset.category;
      renderTabs();
      renderMenu();
    });

    menuEl.addEventListener("click", event => {
      const dec = event.target.closest("[data-dec]");
      const inc = event.target.closest("[data-inc]");
      const add = event.target.closest("[data-add]");

      if (dec || inc) {
        const name = (dec || inc).dataset.dec || (dec || inc).dataset.inc;
        const current = state.draftQty.get(name) || 1;
        state.draftQty.set(name, Math.max(1, current + (inc ? 1 : -1)));
        renderMenu();
      }

      if (add) {
        const item = findItem(add.dataset.add);
        const qty = state.draftQty.get(item.name) || 1;
        const current = state.cart.get(item.name) || { ...item, qty: 0 };
        current.qty += qty;
        state.cart.set(item.name, current);
        showToast(`${item.name}を${qty}点追加しました`);
        renderCart();
      }
    });

    cartEl.addEventListener("click", event => {
      const dec = event.target.closest("[data-cart-dec]");
      const inc = event.target.closest("[data-cart-inc]");
      if (!dec && !inc) return;
      const name = dec ? dec.dataset.cartDec : inc.dataset.cartInc;
      const line = state.cart.get(name);
      line.qty += inc ? 1 : -1;
      if (line.qty <= 0) state.cart.delete(name);
      renderCart();
    });

    document.querySelectorAll("[data-service]").forEach(button => {
      button.addEventListener("click", () => showToast(button.dataset.service));
    });

    document.getElementById("checkout").addEventListener("click", () => {
      if (!state.cart.size) {
        showToast("商品を追加してから注文してください");
        return;
      }
      showToast("注文を送信しました。少々お待ちください");
      state.cart.clear();
      renderCart();
    });

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    updateClock();
    window.setInterval(updateClock, 30000);
    renderTabs();
    renderMenu();
    renderCart();
  </script>
</body>
</html>

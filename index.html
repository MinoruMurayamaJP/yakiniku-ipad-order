<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="refresh" content="0; url=./yakiniku-ipad-order.html">
  <title>焼肉ホール端末 起動</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f4f1ec;
      color: #211d1a;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    }

    main {
      width: min(480px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid #d9d0c7;
      border-radius: 8px;
      background: #fffdf9;
      text-align: center;
      box-shadow: 0 12px 28px rgba(39, 32, 27, .1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: #716963;
      line-height: 1.6;
    }

    a {
      display: inline-grid;
      place-items: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 8px;
      background: #a8221d;
      color: #fff;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>焼肉ホール端末</h1>
    <p>注文入力画面を起動しています。</p>
    <a href="./yakiniku-ipad-order.html">注文入力を開く</a>
  </main>
</body>
</html>
